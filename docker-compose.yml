services:
  postgres:
    image: postgres:16-alpine
    container_name: warehouse_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: warehouse
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/1-schema.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/2-seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d warehouse"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - warehouse-net

  backend:
    build:
      context: ./backend-go
      dockerfile: Dockerfile
    container_name: warehouse_api
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: admin
      DB_PASSWORD: 123456
      DB_NAME: warehouse
      DB_SSLMODE: disable
      JWT_SECRET: your-secret-key-change-in-production
      ENV: production
      PORT: 8080
      HOST: 0.0.0.0
    networks:
      - warehouse-net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  backend-nodejs:
    build:
      context: ./backend-nodejs
      dockerfile: Dockerfile
    container_name: warehouse_api_nodejs
    restart: always
    ports:
      - "3001:3000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: admin
      DB_PASSWORD: 123456
      DB_NAME: warehouse
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
      JWT_EXPIRES_IN: 7d
    networks:
      - warehouse-net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend-web
      dockerfile: Dockerfile
    container_name: warehouse_web
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - warehouse-net

volumes:
  postgres_data:

networks:
  warehouse-net:
    driver: bridge